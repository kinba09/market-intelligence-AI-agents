services:
  postgres:
    image: postgres:16
    container_name: market_postgres
    environment:
      POSTGRES_DB: market_intel
      POSTGRES_USER: market
      POSTGRES_PASSWORD: market
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market -d market_intel"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7
    container_name: market_redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: market_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: market_opensearch
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

  minio:
    image: minio/minio:latest
    container_name: market_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: market_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb -p local/market-intel-raw || true;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: market_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      opensearch:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend

volumes:
  pg_data:
  qdrant_data:
  opensearch_data:
  minio_data:
